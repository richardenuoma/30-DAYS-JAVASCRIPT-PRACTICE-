<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIRTHDAY COUNTDOWM TIMER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Countdown to My Birthday</h1>
        <p class="cake">🎂</p>

        <div class="timerContainer">
            <div class="days">
                <h3 class="digit day">00</h3>
                <P>DAYS</P>
            </div>
            <div class="hours">
                <h3 class="digit hour">00</h3>
                <P>HOURS</P>
            </div>
            <div class="minutes">
                <h3 class="digit  minute">00</h3>
                <P>MINUTES</P>
            </div>
            <div class="sec">
                <h3 class="digit secs ms ">00</h3>
                <P>SECONDS</P>
            </div>
        </div>
    </div>

    
    <script src="app.js"></script>
</body>
</html>
