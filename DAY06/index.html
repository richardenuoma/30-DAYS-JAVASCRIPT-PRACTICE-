<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAT CALCULATOR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>VAT Calculator</h1>
        <div class="inputs">
            <label for="price">PRICE</label>
            <input type="number" id="digitInput">
            
            <div class="taxResultContainer">
                <p>TAX RATE</p>
            <p id="taxResult">20%</p>
            </div>
        </div>

        <div class="result">
            <input type="button" value="Calculate" class="calculateBtn">
            <p>Price including tax</p>
            <p id="totalTaxResult">120GBP</p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
